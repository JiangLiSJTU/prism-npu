# Llama-3.2-1B prefill — 16 层 GQA decoder（S=2048, d=2048）
# 数据来源：meta-llama/Llama-3.2-1B config.json

name: Llama-3.2-1B-prefill-S2048-b1
arch: decoder
layers: 16
ops_b1: 4.45e12               # ~4.45 TFLOPs @ S=2048
weight_mb: 2470.0             # ~1.24B params × 2 bytes (FP16, including tied embed)
bytes_total: 2.374e9          # HBM overflow = (2470-96) × 1e6 = 2.37 GB
alpha_per_batch: null
beta_layer_override: null
note: |
  S=2048 prefill, D=2048, L=16, intermediate=8192, GQA 32Q/8KV heads d_head=64.
  SwiGLU FFN, RoPE.
  典型场景：本地推理 / 小型 LLM prefill.
  预期 regime: HBM bound (large weight overflow + prefill activation)；
  接近 910B4 拐点附近 (arith intensity ≈ 1800 OPs/Byte).

gemm_spec:
  S: 2048
  d_model: 2048
  d_ff: 8192
  n_heads: 32
  n_kv_heads: 8
  d_head: 64
  vocab: 128256
  ffn_type: swiglu
