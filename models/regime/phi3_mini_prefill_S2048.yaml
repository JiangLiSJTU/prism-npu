# Phi-3-mini-3.8B prefill spec (Issue #5 cross-family validation)
#
# Source: microsoft/Phi-3-mini-4k-instruct (HuggingFace config.json)
# https://huggingface.co/microsoft/Phi-3-mini-4k-instruct/blob/main/config.json
#
# Architecture notes (different from training-set families):
# - Full MHA (n_kv_heads = n_heads = 32) — no GQA, unlike Qwen/Llama
# - swiglu FFN (gate_up_proj is fused Linear into 2× d_ff, then SiLU * split)
# - Phi-3-mini-4k vs -128k differ only in RoPE base/scaling; same compute graph

name: Phi-3-mini-3.8B
arch: decoder

# High-level (for regime gate)
layers: 32
ops_b1: 7800.0e9        # ≈ 7.8 TFLOPs/inference at S=2048, b=1 (rough estimate)
weight_mb: 7680          # 3.8B params × 2 bytes
bytes_total: 7680        # weight reload-dominated at b=1

# GEMM-level (for predict_pipe)
gemm_spec:
  S: 2048
  d_model: 3072
  d_ff: 8192
  n_heads: 32
  n_kv_heads: 32         # full MHA — KEY difference from Qwen/Llama/Mistral
  d_head: 96             # 3072 / 32
  vocab: 32064
  ffn_type: swiglu

note: |
  Phi-3-mini cross-family test (Issue #5). v8 sees:
    - layers=32 (similar to SmolLM2-360M's 32)
    - d_model=3072 (between Llama-3.2-1B's 2048 and Llama-2-7B's 4096)
    - swiglu (same as all decoder anchors)
    - full MHA (DIFFERENT — all v8 decoder anchors have GQA)
  Expected bucket: AIV_BOUND (d_model >= 700, S × batch >= 1024).
  Hypothesis: full MHA increases attention compute vs GQA, but v8's
  AIV_BOUND amp_aiv=4.43 may still hold since amp captures aggregate AIV
  rather than head-count-specific.
